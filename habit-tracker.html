<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Venjur</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#faf8f4">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Venjur">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #faf8f4;
    --bg2:      #f2efe8;
    --border:   #e0dbd0;
    --border-light: #ede9e0;
    --text:     #2a2520;
    --text-dim: #8a8070;
    --text-muted: #b8b0a0;
    --c-sprikl: #4a90a4;
    --c-matur:  #7a9e5a;
    --c-gledi:  #c4854a;
    --c-afengi: #9a6a8a;
    --today-bg: #fff8ec;
    --today-border: #e8c878;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inconsolata', monospace;
    font-size: 14px;
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #c8c0b0 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: 2.4rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  h1 em { font-style: italic; color: var(--c-gledi); }

  .subtitle {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  .btn-clear {
    font-family: 'Inconsolata', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: white;
    color: var(--text-dim);
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    border-radius: 2px;
  }

  .btn-clear:hover { border-color: var(--text-dim); color: var(--text); }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .month-label {
    font-family: 'Lora', serif;
    font-size: 1.1rem;
    font-weight: 600;
    min-width: 170px;
    text-align: center;
  }

  .nav-btn {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    background: white;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 2px;
    font-size: 16px;
    line-height: 1;
  }

  .nav-btn:hover { border-color: var(--text); color: var(--text); }

  .tracker-wrap {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead tr {
    background: var(--bg2);
    border-bottom: 2px solid var(--border);
  }

  th {
    padding: 0.8rem 0.5rem;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
  }

  th.th-date {
    text-align: left;
    padding-left: 1rem;
    color: var(--text-muted);
    width: 120px;
  }

  th.th-sprikl { color: var(--c-sprikl); }
  th.th-matur  { color: var(--c-matur); }
  th.th-gledi  { color: var(--c-gledi); }
  th.th-afengi { color: var(--c-afengi); }

  .th-icon { display: block; font-size: 18px; margin-bottom: 2px; }

  tbody tr { border-bottom: 1px solid var(--border-light); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fdfcf9; }

  tbody tr.row-today {
    background: var(--today-bg);
    border-top: 1px solid var(--today-border);
    border-bottom: 1px solid var(--today-border);
  }

  tbody tr.row-today:hover { background: #fff5e0; }
  tbody tr.row-future { opacity: 0.4; pointer-events: none; }

  td {
    padding: 0.4rem 0.5rem;
    text-align: center;
    vertical-align: middle;
  }

  td.td-date {
    text-align: left;
    padding-left: 1rem;
    font-size: 12px;
    white-space: nowrap;
  }

  .d-num { font-weight: 500; }
  .d-wday { font-size: 10px; color: var(--text-muted); margin-left: 4px; }
  .d-today {
    display: inline-block;
    background: var(--today-border);
    color: #7a5500;
    font-size: 9px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
    margin-left: 4px;
    vertical-align: middle;
  }

  td.td-sprikl.done { background: rgba(74,144,164,0.10); }
  td.td-matur.done  { background: rgba(122,158,90,0.10); }
  td.td-gledi.done  { background: rgba(196,133,74,0.10); }
  td.td-afengi.done { background: rgba(154,106,138,0.10); }

  label.cb-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 4px;
  }

  label.cb-wrap input { display: none; }

  .cb-box {
    width: 28px; height: 28px;
    border-radius: 4px;
    border: 2px solid var(--border);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: transparent;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, color 0.1s;
  }

  td.td-sprikl label.cb-wrap:hover .cb-box { border-color: var(--c-sprikl); background: rgba(74,144,164,0.06); }
  td.td-matur  label.cb-wrap:hover .cb-box { border-color: var(--c-matur);  background: rgba(122,158,90,0.06); }
  td.td-gledi  label.cb-wrap:hover .cb-box { border-color: var(--c-gledi);  background: rgba(196,133,74,0.06); }
  td.td-afengi label.cb-wrap:hover .cb-box { border-color: var(--c-afengi); background: rgba(154,106,138,0.06); }

  td.td-sprikl label.cb-wrap input:checked ~ .cb-box { background: var(--c-sprikl); border-color: var(--c-sprikl); color: white; box-shadow: 0 2px 8px rgba(74,144,164,0.45); }
  td.td-matur  label.cb-wrap input:checked ~ .cb-box { background: var(--c-matur);  border-color: var(--c-matur);  color: white; box-shadow: 0 2px 8px rgba(122,158,90,0.45); }
  td.td-gledi  label.cb-wrap input:checked ~ .cb-box { background: var(--c-gledi);  border-color: var(--c-gledi);  color: white; box-shadow: 0 2px 8px rgba(196,133,74,0.45); }
  td.td-afengi label.cb-wrap input:checked ~ .cb-box { background: var(--c-afengi); border-color: var(--c-afengi); color: white; box-shadow: 0 2px 8px rgba(154,106,138,0.45); }

  .stats-bar {
    display: flex;
    gap: 0.6rem;
    padding: 0.8rem 1rem;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
    font-size: 11px;
    color: var(--text-dim);
  }

  .stat { display: flex; align-items: center; gap: 0.35rem; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stat b { color: var(--text); }
  .stat-sep { color: var(--border); }

  @media (max-width: 500px) {
    td.td-date, th.th-date { padding-left: 0.6rem; }
    .d-wday { display: none; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div>
      <h1>V<em>e</em>njur</h1>
      <div class="subtitle">Daglegur þverlægi</div>
    </div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;">
      <button class="btn-clear" onclick="exportData()">&#8599; Export</button>
      <label class="btn-clear" style="cursor:pointer;">&#8601; Import<input type="file" accept=".json" onchange="importData(event)" style="display:none;"></label>
      <button class="btn-clear" onclick="clearMonth()">Hreinsa m&#225;nu&#240;</button>
    </div>
  </header>

  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>

  <div class="tracker-wrap">
    <table>
      <thead>
        <tr>
          <th class="th-date">Dagur</th>
          <th class="th-sprikl"><span class="th-icon">&#128167;</span>Sprikl</th>
          <th class="th-matur"><span class="th-icon">&#129367;</span>Matur</th>
          <th class="th-gledi"><span class="th-icon">&#9728;&#65039;</span>Gle&#240;i</th>
          <th class="th-afengi"><span class="th-icon">&#127863;</span>&#193;fengi</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="stats-bar" id="statsBar"></div>
  </div>

</div>
<script>
var CATS = ['sprikl','matur','gledi','afengi'];
var CAT_COLORS = { sprikl:'#4a90a4', matur:'#7a9e5a', gledi:'#c4854a', afengi:'#9a6a8a' };
var WDAYS = ['Sun','M\u00e1n','\u00deri','Mi\u00f0','Fim','F\u00f6s','Lau'];
var MONTHS = ['Jan\u00faar','Febr\u00faar','Mars','Apr\u00edl','Ma\u00ed','J\u00fan\u00ed','J\u00fal\u00ed','\u00c1g\u00fast','September','\u00d3kt\u00f3ber','N\u00f3vember','Desember'];

var NOW = new Date();
NOW.setHours(0,0,0,0);

var Y = NOW.getFullYear();
var M = NOW.getMonth();

function storeKey() { return 'venjur_' + Y + '_' + pad(M+1); }
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function load() { try { return JSON.parse(localStorage.getItem(storeKey()) || '{}'); } catch(e) { return {}; } }
function save(data) { localStorage.setItem(storeKey(), JSON.stringify(data)); }
function daysIn(y, m) { return new Date(y, m+1, 0).getDate(); }
function dk(d) { return pad(d); }

function render() {
  document.getElementById('monthLabel').textContent = MONTHS[M] + ' ' + Y;

  var data = load();
  var days = daysIn(Y, M);
  var tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  for (var d = 1; d <= days; d++) {
    var date = new Date(Y, M, d);
    var isToday = (date.getTime() === NOW.getTime());
    var isFuture = (date > NOW);
    var dKey = dk(d);
    var dayData = data[dKey] || {};

    var tr = document.createElement('tr');
    if (isToday) tr.className = 'row-today';
    if (isFuture) tr.className = 'row-future';

    // Date cell
    var tdDate = document.createElement('td');
    tdDate.className = 'td-date';
    tdDate.innerHTML =
      '<span class="d-num">' + d + '</span>' +
      '<span class="d-wday">' + WDAYS[date.getDay()] + '</span>' +
      (isToday ? '<span class="d-today">\u00ed dag</span>' : '');
    tr.appendChild(tdDate);

    // One cell per category
    for (var ci = 0; ci < CATS.length; ci++) {
      (function(cat, dK, tr) {
        var val = !!dayData[cat];

        var td = document.createElement('td');
        td.className = 'td-' + cat + (val ? ' done' : '');

        var label = document.createElement('label');
        label.className = 'cb-wrap';

        var input = document.createElement('input');
        input.type = 'checkbox';
        input.checked = val;

        var box = document.createElement('div');
        box.className = 'cb-box';
        box.textContent = '\u2713';

        input.addEventListener('change', function() {
          var d2 = load();
          if (!d2[dK]) d2[dK] = {};
          d2[dK][cat] = this.checked;
          save(d2);
          td.className = 'td-' + cat + (this.checked ? ' done' : '');
          updateStats();
        });

        label.appendChild(input);
        label.appendChild(box);
        td.appendChild(label);
        tr.appendChild(td);
      })(CATS[ci], dKey, tr);
    }

    tbody.appendChild(tr);
  }

  updateStats();
}

function updateStats() {
  var data = load();
  var days = daysIn(Y, M);
  var isCurrentMonth = (Y === NOW.getFullYear() && M === NOW.getMonth());
  var isPastMonth = new Date(Y, M, 1) < NOW && !isCurrentMonth;
  var cutoff = isCurrentMonth ? NOW.getDate() : (isPastMonth ? days : 0);

  var counts = { sprikl:0, matur:0, gledi:0, afengi:0 };
  for (var d = 1; d <= cutoff; d++) {
    var dayData = data[dk(d)] || {};
    for (var ci = 0; ci < CATS.length; ci++) {
      if (dayData[CATS[ci]]) counts[CATS[ci]]++;
    }
  }

  var bar = document.getElementById('statsBar');
  var html = '';
  for (var i = 0; i < CATS.length; i++) {
    var cat = CATS[i];
    html += '<div class="stat">' +
      '<div class="stat-dot" style="background:' + CAT_COLORS[cat] + '"></div>' +
      cat.charAt(0).toUpperCase() + cat.slice(1) +
      '&nbsp;<b>' + counts[cat] + '/' + cutoff + '</b>' +
      '</div>';
    if (i < CATS.length - 1) html += '<span class="stat-sep">&middot;</span>';
  }
  bar.innerHTML = html;
}

function changeMonth(dir) {
  M += dir;
  if (M > 11) { M = 0; Y++; }
  if (M < 0)  { M = 11; Y--; }
  render();
}

function exportData() {
  var allData = {};
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.indexOf('venjur_') === 0) {
      allData[k] = JSON.parse(localStorage.getItem(k));
    }
  }
  var json = JSON.stringify(allData, null, 2);
  var blob = new Blob([json], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'venjur-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      var count = 0;
      for (var k in data) {
        if (k.indexOf('venjur_') === 0) {
          localStorage.setItem(k, JSON.stringify(data[k]));
          count++;
        }
      }
      alert('Import t\u00f3kst! ' + count + ' m\u00e1nu\u00f0ar hla\u00f0nir.');
      render();
    } catch(err) {
      alert('Import mist\u00f3kst. Athuga\u00f0u skr\u00e1ina og reyndu aftur.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearMonth() {
  if (confirm('Hreinsa alla g\u00f6gn fyrir ' + MONTHS[M] + ' ' + Y + '?')) {
    localStorage.removeItem(storeKey());
    render();
  }
}

render();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js')
      .then(function(reg) { console.log('SW registered:', reg.scope); })
      .catch(function(err) { console.log('SW registration failed:', err); });
  });
}
</script>
</body>
</html>
